name: Build Windows Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build SiYuan Kernel
        shell: pwsh
        run: |
          cd kernel
          go build -tags "fts5" -trimpath -ldflags="-s -w" -o SiYuan-Kernel.exe .

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SiYuan-Kernel-windows
          path: kernel/SiYuan-Kernel.exe
